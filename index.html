<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arquivo Jujutsu | Catálogo de Feiticeiros</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/style.css?v=2.0">
</head>
<body>

    <header class="header-principal">
        <div class="header-conteudo">
            <div class="header-titulos">
                <h1>Arquivo Jujutsu</h1>
                <p>Catálogo de Feiticeiros e Maldições</p>
            </div>
            
            <div class="search-container">
                <input type="text" id="busca-personagem" placeholder="Rastrear feiticeiro..." autocomplete="off">
                
                <div class="custom-select-wrapper" tabindex="0">
                    <div class="custom-select-trigger">
                        <span id="filtro-texto">TODOS</span>
                        <span class="custom-select-arrow">▼</span>
                    </div>
                    <ul class="custom-select-options">
                        <li data-value="todos" class="selected">TODOS</li>
                        <li data-value="feiticeiro">FEITICEIROS</li>
                        <li data-value="maldicao">MALDIÇÕES</li>
                        <li data-value="outro">OUTROS</li>
                        <li data-value="favoritos">SELADOS (FAVORITOS)</li>
                    </ul>
                </div>

            </div>
        </div>
    </header>

    <main class="container">
        <section id="grid-personagens" class="grid-personagens">
            </section>
    </main>

    <div id="modal-personagem" class="modal">
        <div class="modal-conteudo">
            <button id="btn-fechar-modal" class="btn-fechar">&times;</button>
            
            <div class="modal-layout">
                <div class="modal-imagem-placeholder">
                    <span id="modal-img-texto">[ Imagem ]</span>
                </div>
                
                <div class="modal-info">
                    <h2 id="modal-nome">Nome do Personagem</h2>
                    <span id="modal-classe" class="badge">Grau</span>
                    <p id="modal-descricao">Descrição detalhada vai aqui...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
</body>
</html>
